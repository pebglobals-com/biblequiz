<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bibleCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bibleSpine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biblePages" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradientHorizontal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite in="SourceGraphic" in2="offset-blur" operator="over"/>
    </filter>
    <pattern id="crossPattern" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="url(#bibleCover)"/>
      <path d="M20 5v30M5 20h30" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Bible cover (closed book perspective) -->
  <g filter="url(#shadow)">
    <!-- Back cover -->
    <path d="M380 80 L480 80 L480 432 L380 432 L380 80 Z" fill="url(#bibleCover)" opacity="0.3"/>
    
    <!-- Main book body -->
    <path d="M40 80 L340 80 L340 432 L40 432 L40 80 Z" fill="url(#bibleCover)" filter="url(#shadow)"/>
    
    <!-- Spine -->
    <path d="M340 80 L380 80 L380 432 L340 432 L340 80 Z" fill="url(#bibleSpine)"/>
    
    <!-- Pages (side view) -->
    <path d="M342 85 L378 85 L378 427 L342 427 L342 85 Z" fill="url(#biblePages)" opacity="0.9"/>
    <path d="M344 88 L376 88 L376 424 L344 424 L344 88 Z" fill="#fefce8"/>
    <path d="M346 91 L374 91 L374 421 L346 421 L346 91 Z" fill="#fef9c3"/>
    
    <!-- Top page edges -->
    <path d="M42 82 L338 82 L338 86 L42 86 L42 82 Z" fill="#fefce8"/>
    <path d="M44 88 L336 88 L336 90 L44 90 L44 88 Z" fill="#fef9c3"/>
    
    <!-- Bottom page edges -->
    <path d="M42 426 L338 426 L338 430 L42 430 L42 426 Z" fill="#fde68a"/>
    <path d="M44 420 L336 420 L336 424 L44 424 L44 420 Z" fill="#fef08a"/>
  </g>
  
  <!-- Gold cross on cover -->
  <g transform="translate(190, 200)">
    <!-- Cross vertical -->
    <rect x="18" y="-60" width="24" height="140" rx="4" fill="url(#goldGradient)"/>
    <!-- Cross horizontal -->
    <rect x="-30" y="-10" width="84" height="24" rx="4" fill="url(#goldGradientHorizontal)"/>
    <!-- Cross center highlight -->
    <rect x="22" y="-56" width="16" height="132" rx="3" fill="url(#goldGradient)" opacity="0.3"/>
    <rect x="-26" y="-6" width="76" height="16" rx="3" fill="url(#goldGradientHorizontal)" opacity="0.3"/>
  </g>
  
  <!-- "HOLY BIBLE" text on spine -->
  <g transform="translate(355, 256) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="url(#goldGradient)" letter-spacing="3">
      HOLY BIBLE
    </text>
  </g>
  
  <!-- Gold corner ornaments on cover -->
  <g fill="url(#goldGradient)">
    <!-- Top left -->
    <path d="M70 110 L90 110 L90 115 L75 115 L75 130 L70 130 Z" opacity="0.9"/>
    <path d="M70 110 L75 110 L75 125 L70 125 Z" opacity="0.7"/>
    <!-- Top right -->
    <path d="M310 110 L290 110 L290 115 L305 115 L305 130 L310 130 Z" transform="scale(-1,1) translate(-380,0)" opacity="0.9"/>
    <!-- Bottom left -->
    <path d="M70 398 L90 398 L90 403 L75 403 L75 388 L70 388 Z" opacity="0.9"/>
    <!-- Bottom right -->
    <path d="M310 398 L290 398 L290 403 L305 403 L305 388 L310 388 Z" transform="scale(-1,1) translate(-380,0)" opacity="0.9"/>
  </g>
  
  <!-- Ribbon bookmark -->
  <path d="M340 100 L370 100 L370 200 L360 180 L340 200 Z" fill="#dc2626" filter="url(#shadow)"/>
  <path d="M342 102 L368 102 L368 196 L358 178 L342 196 Z" fill="#ef4444" opacity="0.8"/>
  
  <!-- Gold filigree on cover -->
  <g fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.6">
    <ellipse cx="190" cy="256" rx="80" ry="50"/>
    <ellipse cx="190" cy="256" rx="50" ry="30"/>
    <ellipse cx="190" cy="256" rx="20" ry="12"/>
  </g>
  
  <!-- Subtle page lines on side -->
  <g stroke="#eab308" stroke-width="0.5" opacity="0.15">
    <line x1="350" y1="110" x2="370" y2="110"/>
    <line x1="350" y1="130" x2="370" y2="130"/>
    <line x1="350" y1="150" x2="370" y2="150"/>
    <line x1="350" y1="170" x2="370" y2="170"/>
    <line x1="350" y1="190" x2="370" y2="190"/>
    <line x1="350" y1="210" x2="370" y2="210"/>
    <line x1="350" y1="230" x2="370" y2="230"/>
    <line x1="350" y1="250" x2="370" y2="250"/>
    <line x1="350" y1="270" x2="370" y2="270"/>
    <line x1="350" y1="290" x2="370" y2="290"/>
    <line x1="350" y1="310" x2="370" y2="310"/>
    <line x1="350" y1="330" x2="370" y2="330"/>
    <line x1="350" y1="350" x2="370" y2="350"/>
    <line x1="350" y1="370" x2="370" y2="370"/>
    <line x1="350" y1="390" x2="370" y2="390"/>
    <line x1="350" y1="410" x2="370" y2="410"/>
  </g>
</svg>